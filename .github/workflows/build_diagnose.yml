name: OxClient APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew

      # ── Maven snapshot v800'de takılı kaldığı için kaynağı doğrudan
      # çekiyoruz (wclient'teki relay/Protocol klasörüyle aynı isim/yapı —
      # onlar kalıcı commit'liyor, biz her CI run'ında taze çekiyoruz,
      # işlevsel olarak aynı sonuç). ──────────────────────────────────
      - name: Clone CloudburstMC/Protocol kaynağı (Maven snapshot bypass)
        run: |
          rm -rf relay/Protocol
          mkdir -p relay
          git clone --depth 1 -b 3.0 https://github.com/CloudburstMC/Protocol.git relay/Protocol
          echo "Klonlanan commit:"
          git -C relay/Protocol log -1 --oneline

      # ── LoginPacket'in gerçek (v818+) alan yapısını görelim ──────────
      # LoginPacketListener.kt'deki packet.chain / packet.extra artık
      # derlenmiyor — kör tahmin yerine gerçek kaynağı basıyoruz.
      - name: Diagnose LoginPacket.java gerçek alanları
        run: |
          FILE=$(find relay/Protocol -iname "LoginPacket.java" | head -1)
          echo "Bulunan dosya: $FILE"
          if [ -n "$FILE" ]; then
            cat "$FILE"
          else
            echo "LoginPacket.java bulunamadı — find ile genel arama:"
            find relay/Protocol -iname "*Login*"
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --refresh-dependencies
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      # ── TEŞHİS ADIMI (assembleDebug'dan SONRA — jar ancak derleme
      # gerçekten o sınıfları kullanınca local cache'e iniyor; bir önceki
      # denemede ":app:dependencies" sadece metadata/pom çözüyordu, jar'ı
      # indirmiyordu, o yüzden find boş döndü) ──────────────────────────
      - name: Diagnose bedrock-codec dependency
        if: always()
        run: |
          echo "── Resolved jar dosyaları (tüm ~/.gradle/caches içinde) ──"
          find ~/.gradle/caches -iname "bedrock-codec*.jar" -exec ls -la {} \;

          echo ""
          echo "── Her jar içindeki versiyon paketleri ──"
          for jar in $(find ~/.gradle/caches -iname "bedrock-codec*.jar"); do
            echo "=== $jar ==="
            unzip -l "$jar" | grep -oE "v[0-9]+/Bedrock_v[0-9]+\.class" | sed 's#/Bedrock_v[0-9]*\.class##' | sort -t v -k2 -n -u
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --refresh-dependencies
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
