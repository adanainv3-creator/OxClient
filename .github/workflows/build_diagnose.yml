name: OxClient APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # ── TEŞHİS ADIMI ─────────────────────────────────────────────────────
      # --refresh-dependencies denendi, sonuç değişmedi (hâlâ 800'de tıkalı).
      # Bu, sorunun CI cache'i olmadığını gösteriyor — gerçekten resolve
      # edilen bedrock-codec jar'ının içeriğine bakmamız gerekiyor.
      # Bu adım: jar'ı bulur, SNAPSHOT timestamp'ini ve içindeki TÜM
      # v### paketlerini listeler. Sonucu bana yapıştır.
      - name: Diagnose bedrock-codec dependency
        run: |
          echo "── Dependency resolution ──"
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath --refresh-dependencies 2>&1 | grep -i -A 2 "bedrock-codec" || echo "bedrock-codec dependency tree'de bulunamadı"

          echo ""
          echo "── Resolved jar dosyaları ──"
          find ~/.gradle/caches/modules-2 -iname "bedrock-codec*.jar" -exec ls -la {} \;

          echo ""
          echo "── Her jar içindeki versiyon paketleri ──"
          for jar in $(find ~/.gradle/caches/modules-2 -iname "bedrock-codec*.jar"); do
            echo "=== $jar ==="
            unzip -l "$jar" | grep -oE "v[0-9]+/Bedrock_v[0-9]+\.class" | sed 's#/Bedrock_v[0-9]*\.class##' | sort -t v -k2 -n -u
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --refresh-dependencies
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --refresh-dependencies
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
