name: OxClient APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew

      # ── relay/Protocol artık repoya gömülü (vendor_protocol.yml ile
      # bir kere commit'lendi) — her build'de tekrar clone YOK.
      # Sadece varlığını doğruluyoruz. ─────────────────────────────────
      - name: relay/Protocol varlığını doğrula
        run: |
          if [ ! -f "relay/Protocol/settings.gradle.kts" ]; then
            echo "!! relay/Protocol bulunamadı — vendor_protocol.yml workflow'unu çalıştırdın mı?"
            exit 1
          fi
          echo "relay/Protocol mevcut ✓"
          find relay/Protocol -maxdepth 1 -type d

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      # ── TEŞHİS ADIMI — composite build (includeBuild) kullanıldığı için
      # jar artık ~/.gradle/caches'e değil, relay/Protocol/bedrock-codec/
      # build/libs/ altına düşüyor. ──────────────────────────────────────
      - name: Diagnose bedrock-codec (composite build çıktısı)
        if: always()
        run: |
          echo "── relay/Protocol/bedrock-codec build çıktıları ──"
          find relay/Protocol/bedrock-codec -path "*/build/libs/*.jar" -exec ls -la {} \;

          echo ""
          echo "── Kaynak ağacında hangi Bedrock_vXXX sınıfları var (derlemeden bağımsız gerçek liste) ──"
          find relay/Protocol/bedrock-codec -iname "Bedrock_v*.java" -o -iname "Bedrock_v*.kt" | sed -E 's#.*Bedrock_v([0-9]+)\.(java|kt)#\1#' | sort -n -u

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "── KRİTİK KONTROL: 2b2tpe.org protocol=944 istiyor.     ──"
          echo "════════════════════════════════════════════════════════"
          for v in 898 924 935 944 948 975; do
            if find relay/Protocol/bedrock-codec -iname "Bedrock_v${v}.*" | grep -q .; then
              echo "  [VAR]  v${v}"
            else
              echo "  [YOK]  v${v}"
            fi
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
