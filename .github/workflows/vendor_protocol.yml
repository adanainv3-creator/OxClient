name: Vendor CloudburstMC Protocol + NBT (tek seferlik / gerektiğinde çalıştır)

on:
  workflow_dispatch:
    inputs:
      protocol_branch:
        description: "Protocol repo branch/tag (örn. 3.0)"
        required: false
        default: "3.0"
      nbt_branch:
        description: "NBT repo branch/tag (örn. master)"
        required: false
        default: "master"

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Protocol kaynağını klonla ve gömme
        run: |
          rm -rf relay/Protocol
          mkdir -p relay
          git clone --depth 1 -b "${{ inputs.protocol_branch }}" https://github.com/CloudburstMC/Protocol.git relay/Protocol
          echo "Protocol klonlanan commit:"
          git -C relay/Protocol log -1 --oneline

          # nested .git'i sil — yoksa ana repoya normal dosya olarak eklenemez
          rm -rf relay/Protocol/.git

      - name: NBT kaynağını klonla ve gömme
        run: |
          rm -rf relay/NBT
          mkdir -p relay
          git clone --depth 1 -b "${{ inputs.nbt_branch }}" https://github.com/CloudburstMC/NBT.git relay/NBT
          echo "NBT klonlanan commit:"
          git -C relay/NBT log -1 --oneline

          rm -rf relay/NBT/.git

      - name: Commit ve push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add relay/Protocol relay/NBT
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "vendor: CloudburstMC/Protocol (${{ inputs.protocol_branch }}) + CloudburstMC/NBT (${{ inputs.nbt_branch }}) kaynağını göm"
            git push
          fi

      - name: Özet
        run: |
          echo "── relay/Protocol içinde bulunan modüller ──"
          find relay/Protocol -maxdepth 1 -type d
          echo ""
          echo "── bedrock-codec içindeki Bedrock_vXXX sınıfları ──"
          find relay/Protocol/bedrock-codec -iname "Bedrock_v*.java" -o -iname "Bedrock_v*.kt" | sort
          echo ""
          echo "── relay/NBT içindeki modüller ──"
          find relay/NBT -maxdepth 1 -type d
          echo ""
          echo "── NBT okuma/limit ile ilgili sınıflar ──"
          find relay/NBT -iname "NBTInputStream.java" -o -iname "LimitedDataInput.java" -o -iname "NbtUtils.java" | sort
