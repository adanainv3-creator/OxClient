name: Generate Keystore
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias oxclient \
            -storepass "GECICI_SIFRE_DEGISTIR" \
            -keypass "GECICI_SIFRE_DEGISTIR" \
            -dname "CN=OxClient, OU=Dev, O=OxClient, L=Istanbul, ST=Istanbul, C=TR"
          base64 -w0 release.jks > release_b64.txt
      - uses: actions/upload-artifact@v4
        with:
          name: keystore-output
          path: |
            release.jks
            release_b64.txt
