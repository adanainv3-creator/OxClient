name: OxClient APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
      # NOT: ~/.gradle/caches artık actions/cache'e DAHIL EDİLMİYOR.
      # Sebep: bedrock-codec/bedrock-connection SNAPSHOT bağımlılıkları bu
      # klasörde cache'leniyordu ve cache key (gradle dosyalarının hash'i)
      # SNAPSHOT versiyon string'i değişmediği için asla değişmiyordu —
      # sonuç: ilk build'de çekilen eski SNAPSHOT içeriği sonsuza kadar
      # geri yükleniyordu, Gradle da "zaten güncel" sanıp uzak repoya
      # hiç bakmıyordu. wrapper + ~/.m2 cache'lenmeye devam ediyor
      # (onlar versiyonlanmış/sabit içerik, sorun yok).
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --refresh-dependencies
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --refresh-dependencies
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: OxClient-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
